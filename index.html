<!DOCTYPE html>
<html>
<head>
  <title>Pocket Stylist AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body{
      margin:0;
      background:#0f0f0f;
      font-family:Arial, sans-serif;
      color:white;
      text-align:center;
    }
    header{
      padding:20px;
      font-size:28px;
      font-weight:bold;
      background:#111;
      border-bottom:1px solid #222;
    }
    .container{
      margin-top:40px;
    }
    textarea{
      width:80%;
      max-width:500px;
      height:100px;
      padding:10px;
      border-radius:10px;
      border:none;
      font-size:16px;
    }
    button{
      margin:15px;
      padding:15px 30px;
      border:none;
      border-radius:25px;
      font-size:16px;
      cursor:pointer;
      background:#00ff99;
      transition:0.3s;
    }
    button:hover{
      background:#00cc77;
      transform:scale(1.05);
    }
    #result{
      margin-top:30px;
      width:80%;
      margin-left:auto;
      margin-right:auto;
      background:#1a1a1a;
      padding:20px;
      border-radius:15px;
      display:none;
      white-space:pre-line;
    }
  </style>
</head>

<body>

<header>👔 Pocket Stylist AI</header>

<div class="container">
  <p>Kombinini yaz, sana stilist gibi önerelim.</p>

  <textarea id="userInput" placeholder="Örn: Siyah oversize tişört ve beyaz sneaker ile nasıl kombin yapabilirim?"></textarea>
  <br>
  <button onclick="askAI()">Analiz Et</button>

  <div id="result"></div>
</div>

<script>
async function askAI() {
  const userText = document.getElementById("userInput").value;
  const resultDiv = document.getElementById("result");

  if (!userText) {
    alert("Lütfen bir şey yaz.");
    return;
  }

  resultDiv.style.display = "block";
  resultDiv.innerHTML = "AI düşünüyor...";

  const response = await fetch("http://localhost:5000/ask-ai", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ message: userText })
  });

  const data = await response.json();

  resultDiv.innerHTML = data.reply;
}
</script>

</body>
</html>
