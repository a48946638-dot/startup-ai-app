<!DOCTYPE html>
<html>
<head>
  <title>Pocket Stylist AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body{
      margin:0;
      background:#0f0f0f;
      font-family:Arial, sans-serif;
      color:white;
      text-align:center;
    }
    header{
      padding:20px;
      font-size:28px;
      font-weight:bold;
      background:#111;
      border-bottom:1px solid #222;
    }
    .container{
      margin-top:40px;
    }
    button{
      margin:15px;
      padding:15px 30px;
      border:none;
      border-radius:25px;
      font-size:16px;
      cursor:pointer;
      background:#00ff99;
      transition:0.3s;
    }
    button:hover{
      background:#00cc77;
      transform:scale(1.05);
    }
    #result{
      margin-top:30px;
      width:80%;
      margin-left:auto;
      margin-right:auto;
      background:#1a1a1a;
      padding:20px;
      border-radius:15px;
      display:none;
    }
  </style>
</head>

<body>

<header>👔 Pocket Stylist AI</header>

<div class="container">
  <p>Fotoğraf yükle, sana kombin ve saç modeli önerelim.</p>

  <input type="file" id="imageInput">
  <br>
  <button onclick="analyzeImage()">Analiz Et</button>

  <div id="result"></div>
</div>

<script>
async function analyzeImage() {
  const fileInput = document.getElementById("imageInput");
  const resultDiv = document.getElementById("result");

  if (!fileInput.files[0]) {
    alert("Lütfen bir fotoğraf seç.");
    return;
  }

  const reader = new FileReader();
  reader.readAsDataURL(fileInput.files[0]);

  reader.onload = async function() {
    resultDiv.style.display = "block";
    resultDiv.innerHTML = "Analiz ediliyor...";

    const response = await fetch("http://localhost:5000/analyze", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ image: reader.result })
    });

    const data = await response.json();
    resultDiv.innerHTML = data.result;
  };
}
</script>

</body>
</html>
